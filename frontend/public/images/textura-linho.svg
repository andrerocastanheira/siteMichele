<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8913A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5E3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1A0E;stop-opacity:1" />
    </linearGradient>
    <pattern id="p" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#g)"/>
  <rect width="1200" height="600" fill="url(#p)"/>
</svg>
